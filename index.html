<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexpress</title>

  <style>
    :root {
      --purple: #812990;
      --black: #000000;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    body {
      margin: 0;
      font-family: "Roboto", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      background: var(--purple);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }

    .lang-switch button {
      background: white;
      color: var(--purple);
      border: none;
      padding: 6px 10px;
      margin-left: 6px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1 {
      margin-top: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .newsletter-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .newsletter-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .newsletter-date {
      color: var(--muted);
      margin-bottom: 10px;
    }

    .btn {
      background: var(--purple);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">NEXPRESS</div>

    <div class="lang-switch">
      <button onclick="setLang('cs')">CZ</button>
      <button onclick="setLang('en')">EN</button>
    </div>
  </div>

  <div class="container">
    <div class="card">

      <h1 id="title"></h1>
      <p class="subtitle" id="subtitle"></p>

      <div id="content">Loading...</div>

    </div>
  </div>

  <script>
    let lang = "cs";

    const translations = {
      cs: {
        title: "Firemní newsletter",
        subtitle: "Stáhněte si nejnovější vydání Nexpress.",
        download: "Stáhnout PDF"
      },
      en: {
        title: "Company Newsletter",
        subtitle: "Download the latest Nexpress issue.",
        download: "Download PDF"
      }
    };

    function setLang(l) {
      lang = l;
      renderStatic();
      loadNewsletters();
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString(lang === "cs" ? "cs-CZ" : "en-GB", {
        year: "numeric",
        month: "long"
      });
    }

    function renderStatic() {
      document.getElementById("title").innerText = translations[lang].title;
      document.getElementById("subtitle").innerText = translations[lang].subtitle;
    }

    async function loadNewsletters() {
      const res = await fetch("newsletters.json");
      const data = await res.json();

      const html = data.map(n => `
        <div class="newsletter-item">
          <div class="newsletter-title">
            Nexpress – ${formatDate(n.date)}
          </div>
          <div class="newsletter-date">${formatDate(n.date)}</div>
          <a class="btn" href="${n.file}" download>
            ${translations[lang].download}
          </a>
        </div>
      `).join("");

      document.getElementById("content").innerHTML = html;
    }

    renderStatic();
    loadNewsletters();
  </script>

</body>
</html>
