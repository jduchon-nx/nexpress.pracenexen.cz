<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletters</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.6;
    }

    .newsletter-list {
      display: grid;
      gap: 16px;
    }

    .newsletter-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      background: #fafafa;
    }

    .newsletter-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .newsletter-date {
      color: var(--muted);
      margin-bottom: 14px;
      font-size: 0.95rem;
    }

    .download-btn {
      display: inline-block;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
    }

    .download-btn:hover {
      background: var(--accent-hover);
    }

    .empty,
    .loading,
    .error {
      color: var(--muted);
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <main class="card">
      <h1>Public Newsletters</h1>
      <p class="subtitle">
        Download the latest newsletters below.
      </p>

      <div id="content" class="loading">Loading newsletters...</div>
    </main>
  </div>

  <script>
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return dateStr;
      return date.toLocaleDateString("en-GB", {
        year: "numeric",
        month: "long"
      });
    }

    async function loadNewsletters() {
      const content = document.getElementById("content");

      try {
        const response = await fetch("newsletters.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load newsletters.json");
        }

        const newsletters = await response.json();

        if (!Array.isArray(newsletters) || newsletters.length === 0) {
          content.innerHTML = '<div class="empty">No newsletters available yet.</div>';
          return;
        }

        const items = newsletters.map(item => `
          <div class="newsletter-item">
            <div class="newsletter-title">${item.title}</div>
            <div class="newsletter-date">${formatDate(item.date)}</div>
            <a class="download-btn" href="${item.file}" download>Download PDF</a>
          </div>
        `).join("");

        content.innerHTML = `<div class="newsletter-list">${items}</div>`;
      } catch (error) {
        content.innerHTML = `<div class="error">Could not load newsletters.</div>`;
        console.error(error);
      }
    }

    loadNewsletters();
  </script>
</body>
</html>
